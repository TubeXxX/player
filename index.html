<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Player</title>

<style>

/* GOOGLE TRANSLATE FIX */

.goog-te-banner-frame.skiptranslate,
.goog-te-gadget-icon,
#goog-gt-tt,
.goog-te-balloon-frame,
.goog-te-menu-frame { display:none!important; }

body > .skiptranslate { display:none!important; top:0!important; }
body{ top:0!important; }

/* BODY */

body{
margin:0;
background:#000;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
font-family:Arial,sans-serif;
color:#fff;
overflow:hidden
}

/* PLAYER */

.player{
position:relative;
width:90vw;
max-width:900px;
aspect-ratio:16/9;
background:#000 url("ai_bot.png") center/cover no-repeat;
border-radius:10px;
overflow:hidden;
}

/* CONTROLS */

.controls{
position:absolute;
bottom:0;
left:0;
right:0;
background:linear-gradient(to top, rgba(0,0,0,.85), transparent);
display:flex;
align-items:center;
padding:10px;
gap:12px;
font-size:14px;
}

.btn{
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
min-width:24px;
}

/* VOLUME */

.volume{
display:flex;
align-items:center;
gap:6px;
}

.volume input{
width:80px;
cursor:pointer;
}

/* PROGRESS */

.progress-container{
flex:1;
display:flex;
align-items:center;
gap:10px;
}

.progress-bar{
flex:1;
height:5px;
background:#333;
border-radius:3px;
cursor:pointer;
overflow:hidden;
}

.progress{
height:100%;
width:0%;
background:#e65c2d;
}

.time{
font-size:12px;
white-space:nowrap;
}

/* RIGHT SIDE */

.right-controls{
display:flex;
gap:10px;
}

/* BUFFERING */

.buffering{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,.85);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:15px;
font-size:20px;
z-index:2;
}

/* SPINNER */

.spinner{
width:50px;
height:50px;
border:4px solid rgba(255,255,255,0.2);
border-top:4px solid #e65c2d;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

/* MODAL */

.modal{
display:none;
position:fixed;
z-index:10000;
top:0;
left:0;
width:100%;
height:100%;
background:transparent;
align-items:center;
justify-content:center;
opacity:0;
transition:.3s;
}

.modal.show{
display:flex;
opacity:1;
}

.modal-content{
background:transparent;
text-align:center;
max-width:320px;
color:#fff;
}

/* TEXT */

.modal-content p{
font-weight:bold;
color:#e65c2d;
text-shadow:0 0 6px rgba(0,0,0,.8);
}

/* BUTTON */

.cancel-btn{
padding:10px 22px;
border-radius:6px;
text-decoration:none;
color:#fff;
background:#dc3545;
display:inline-block;
margin-top:10px;
}

.cancel-btn:hover{
background:#a71d2a;
}

/* MOBILE */

@media(max-width:600px){
.controls{padding:6px;font-size:12px}
.volume input{width:60px}
}

</style>
</head>

<body>

<div id="google_translate_element" style="display:none;"></div>

<div class="player">

<div class="buffering">
  <div class="spinner"></div>
  <div id="buffer-text">Loading video...</div>
</div>

<div class="controls">

<div class="btn" id="play-btn">▶</div>

<div class="volume">
<div class="btn">🔊</div>
<input type="range" min="0" max="100" value="50">
</div>

<div class="progress-container">
<div class="progress-bar" id="progress-bar">
<div class="progress" id="progress"></div>
</div>
<div class="time" id="time">0:00 / 0:00</div>
</div>

<div class="right-controls">
<div class="btn">⚙</div>
<div class="btn">⛶</div>
</div>

</div>
</div>

<div class="modal" id="modal">
<div class="modal-content">

<p>To watch the video, please answer a few questions</p>

<iframe 
src="https://tone.affomelody.com/click?pid=3749&offer_id=795&l=1703486163"
width="100%" height="400" frameborder="0">
</iframe>

<a href="https://vipxtubex.github.io/fullx" 
class="cancel-btn" 
target="_blank">
Cancel
</a>

</div>
</div>

<script>

const modal=document.getElementById("modal")
const bufferText=document.getElementById("buffer-text")

let currentTime=0
let totalDuration=800
let interval=null

function formatTime(s){
let m=Math.floor(s/60)
let sec=s%60
return m+":"+sec.toString().padStart(2,"0")
}

function update(){
document.getElementById("time").textContent=
formatTime(currentTime)+" / "+formatTime(totalDuration)

document.getElementById("progress").style.width=
(currentTime/totalDuration*100)+"%"
}

function start(){
if(interval) return

interval=setInterval(()=>{
if(currentTime<totalDuration){
currentTime++
update()
}
},1000)
}

function showModal(){
setTimeout(()=>{

modal.classList.add("show")

// фриз перед ошибкой
setTimeout(()=>{
clearInterval(interval)
},2500)

// ошибка после модалки
setTimeout(()=>{
bufferText.textContent="Missing codecs."
},700)

},3000)
}

document.getElementById("play-btn").onclick=()=>{
start()
showModal()
}

window.onload=()=>{
start()
showModal()
}

document.getElementById("progress-bar").onclick=(e)=>{
let rect=e.target.getBoundingClientRect()
let x=e.clientX-rect.left
currentTime=Math.floor((x/rect.width)*totalDuration)
update()
}

update()

/* GOOGLE TRANSLATE AUTO */

function googleTranslateElementInit(){
new google.translate.TranslateElement(
{pageLanguage:'en',autoDisplay:false},
'google_translate_element'
)

const userLang=navigator.language||navigator.userLanguage
const lang=userLang.split('-')[0]

const check=setInterval(()=>{
const select=document.querySelector('.goog-te-combo')
if(select){
select.value=lang
select.dispatchEvent(new Event('change'))
clearInterval(check)
}
},500)
}

</script>

<script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
